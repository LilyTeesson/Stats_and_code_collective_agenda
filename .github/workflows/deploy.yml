name: Deploy to Public Repo

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            lubridate
            knitr
            readxl
            flextable
            magrittr
            officer

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: "Stats_and_code_collective_agenda.qmd"

      - name: Copy index.html to output folder
        run: |
          mkdir -p output
          cp index.html output/index.html

      - name: Deploy to public repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOPY_TOKEN }}
        with:
          source-directory: "output"
          destination-github-username: "LilyTeesson"
          destination-repository-name: "Stats_and_code_collective_agenda"
          target-branch: main
          commit-message: "update agenda"
